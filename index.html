<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>WattFox — Stromtarif-Cockpit</title>
<meta name="theme-color" content="#14181A" />
<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="./icon-192.png" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="WattFox" />
<style>
  @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap");
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #14181A; color: #EDEDE9; font-family: Inter, Arial, sans-serif; }
  input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; border-radius: 2px; background: #2E3634; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #E8A33D; cursor: pointer; margin-top: -5px; }
  input[type=range]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: #E8A33D; border: none; cursor: pointer; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #2E3634; border-radius: 4px; }
  button { font-family: inherit; cursor: pointer; transition: border-color 0.15s ease, background-color 0.15s ease, transform 0.1s ease; }
  button:hover { filter: brightness(1.08); }
  button:active { transform: scale(0.98); }
  .stc-mono { font-family: "IBM Plex Mono", monospace; }
  .stc-display { font-family: "Space Grotesk", sans-serif; }

  .wattfox-grid { display: grid; grid-template-columns: 1fr; gap: 24px; }
  @media (min-width: 1024px) {
    .wattfox-grid { grid-template-columns: 380px 1fr; align-items: start; }
    .wattfox-panel { position: sticky; top: 16px; max-height: calc(100vh - 32px); overflow-y: auto; padding-right: 4px; }
  }
</style>

    defaultScale: 500,
    kwhPerUnit: 7900,
    tag: "commercial"

};

// ---------------------------------------------------------------------------
// Hilfsfunktionen: Tagesprofile (96 Werte, Summe = 1)
// ---------------------------------------------------------------------------
function normalize(arr) {
  const s = arr.reduce((a, b) => a + b, 0);
  return arr.map(v => v / s);
}
function bump(center, width, x) {
  return Math.exp(-((x - center) ** 2) / (2 * width * width));
}
function buildShape(bumps, base = 0.15) {
  const arr = [];
  for (let i = 0; i < STEPS_PER_DAY; i++) {
    const h = i / 4;
    let v = base;
    bumps.forEach(([c, w, amp]) => v += amp * bump(c, w, h));
    arr.push(v);
  }
  return normalize(arr);
}
const SHAPES = {
  EFH_base: buildShape([[7.5, 1.3, 1.0], [19.5, 2.0, 1.4]]),
  MFH_base: buildShape([[7.5, 1.6, 0.7], [19, 2.4, 1.0]], 0.3),
  GEWERBE_base: buildShape([[13, 4.5, 1.6]], 0.1),
  INDUSTRIE_base: buildShape([[13, 7, 0.4]], 0.75),
  GROSSKUNDE_base: buildShape([[13, 8, 0.15]], 0.9),
  LAD_evening: buildShape([[19.5, 2.2, 1.6]], 0.05),
  LAD_daytime: buildShape([[11, 3.5, 1.3]], 0.08),
  WP_heating: buildShape([[7, 1.4, 1.0], [20, 1.6, 0.9]], 0.35),
  BOILER_daily: buildShape([[6, 1.2, 1.4], [19, 1.6, 0.5]], 0.15)
};
function seasonTemp(d) {
  return 9 - 10 * Math.cos(2 * Math.PI * (d - 15) / 365);
}
function pvIrradiance(d) {
  // 0 = Wintertief, 1 = Sommerhoch; kalibriert auf CH-Jahresertrag ~900-1000 kWh/kWp
  const seasonal = 0.5 + 0.5 * Math.cos(2 * Math.PI * (d - 172) / 365);
  return 0.12 + 0.30 * seasonal;
}
function isWeekend(d, startWeekday) {
  const wd = (d + startWeekday) % 7;
  return wd === 5 || wd === 6;
}

// ---------------------------------------------------------------------------
// Lastmodelle je Hebel (jeweils 96 Werte, kWh je 15-Min-Intervall)
// ---------------------------------------------------------------------------
function pvDay(kwp, d) {
  if (kwp <= 0) return new Array(STEPS_PER_DAY).fill(0);
  const irr = Math.max(0.05, Math.min(0.5, pvIrradiance(d)));
  const out = [];
  for (let i = 0; i < STEPS_PER_DAY; i++) {
    const h = i / 4;
    let p = 0;
    if (h >= 6 && h <= 20) p = Math.sin(Math.PI * (h - 6) / 14);
    out.push(Math.max(0, kwp * p * irr * 0.25));
  }
  return out;
}
function baseDay(type, annualKwh, d, startWeekday) {
  const shape = SHAPES[`${type}_base`];
  const weekendFactor = isWeekend(d, startWeekday) ? type === "GROSSKUNDE" ? 0.85 : BUILDING_TYPES[type].tag === "commercial" ? 0.35 : 1.1 : 1.0;
  const seasonAmp = BUILDING_TYPES[type].tag === "residential" ? 0.15 : 0.05;
  const seasonFactor = 1 + seasonAmp * Math.cos(2 * Math.PI * (d - 15) / 365);
  const dailyTotal = annualKwh / 365 * weekendFactor * seasonFactor;
  return shape.map(w => w * dailyTotal);
}

// Wärmepumpe: elektrische Leistung = thermischer Bedarf / COP
function wpDay(kwTh, cop, d) {
  if (kwTh <= 0) return new Array(STEPS_PER_DAY).fill(0);
  const t = seasonTemp(d);
  const heatFactor = Math.max(0, Math.min(1, (16 - t) / 26));
  const dailyKwhTh = kwTh * 18 * heatFactor;
  const dailyKwhEl = dailyKwhTh / cop;
  return SHAPES.WP_heating.map(w => w * dailyKwhEl);
}

// Elektroheizung: wie Wärmepumpe, aber direkt-elektrisch (COP = 1)
function elektroheizungDay(kwEl, d) {
  if (kwEl <= 0) return new Array(STEPS_PER_DAY).fill(0);
  const t = seasonTemp(d);
  const heatFactor = Math.max(0, Math.min(1, (16 - t) / 26));
  const dailyKwhEl = kwEl * 18 * heatFactor;
  return SHAPES.WP_heating.map(w => w * dailyKwhEl);
}

// Elektrischer Warmwasserboiler: ganzjährig, leichte Mehrlast im Winter
// (kälteres Zulaufwasser), Reheizung morgens/abends
function boilerDay(kw, d) {
  if (kw <= 0) return new Array(STEPS_PER_DAY).fill(0);
  const t = seasonTemp(d);
  const seasonFactor = 1 + 0.15 * Math.max(0, (10 - t) / 25);
  const dailyKwh = kw * 2.0 * seasonFactor; // ~2 Vollaststunden/Tag als Grundannahme
  return SHAPES.BOILER_daily.map(w => w * dailyKwh);
}
function ladDay(kw, count, sessionsPerWeek, shapeKey, d, startWeekday) {
  if (kw <= 0 || count <= 0) return new Array(STEPS_PER_DAY).fill(0);
  const weekendFactor = isWeekend(d, startWeekday) ? 0.5 : 1;
  const dailyKwh = kw * count * (sessionsPerWeek / 7) * 2.2 * weekendFactor;
  return SHAPES[shapeKey].map(w => w * dailyKwh);
}

// Erzeugt N gleichmässig über den Tag verteilte Tarifstufen als Startpunkt
// für den "Dynamischen Tarif" — Preise/Zeiten sind danach per Regler frei anpassbar.
function generateDynamicTiers(n) {
  const seg = 24 / n;
  return Array.from({
    length: n
  }, (_, i) => ({
    id: `dyn${i}`,
    name: `Tarif ${i + 1}`,
    price: +(16 + i * (20 / Math.max(1, n - 1))).toFixed(1),
    startHour: Math.round(i * seg),
    endHour: Math.round((i + 1) * seg),
    scope: "all",
    color: DYNAMIC_TIER_COLORS[i % DYNAMIC_TIER_COLORS.length]
  }));
}

// Simuliertes Echtzeit-Signal für Systemdienstleistungen (z.B. Primärregelleistung/
// FCR, die Swissgrid ausschreibt und EWs/Aggregatoren über kleine Batteriespeicher
// anbieten können). Da keine reale Swissgrid-Schnittstelle angebunden ist, wird
// hier ein plausibles, zeitabhängiges Muster simuliert (höhere Vergütung in
// Lastspitzenzeiten morgens/abends).
function sdlInstantRates(date) {
  const hour = date.getHours() + date.getMinutes() / 60;
  const base = 3.5 + 2.2 * Math.sin((hour - 7) / 24 * Math.PI * 2);
  const noise = Math.sin(date.getTime() / 180000) * 0.6;
  const charge = Math.max(0.3, +(base + noise).toFixed(2));
  const discharge = Math.max(0.3, +(base * 1.35 + noise).toFixed(2));
  return {
    charge,
    discharge
  };
}

// Ermittelt den aktiven Tarif für einen Zeitpunkt (Zeitfenster können über
// Mitternacht laufen, z.B. 22-6 Uhr). scope: "all" | "weekday" | "weekend".
function getTariffTier(tiers, d, stepInDay, startWeekday) {
  const hour = stepInDay / 4;
  const wknd = isWeekend(d, startWeekday);
  for (const t of tiers) {
    if (t.scope === "weekend" && !wknd) continue;
    if (t.scope === "weekday" && wknd) continue;
    if (t.startHour > t.endHour) {
      if (hour >= t.startHour || hour < t.endHour) return t;
    } else {
      if (hour >= t.startHour && hour < t.endHour) return t;
    }
  }
  return tiers[0];
}

// Höchster Tarifpreis innerhalb der nächsten `lookaheadSteps` 15-Min-Slots
// (für die vorausschauende Batteriesteuerung: erkennt bevorstehende teure
// Zeitfenster, unabhängig davon wie viele Tarifstufen es gibt).
function maxPriceWithin(tiers, d, stepInDay, startWeekday, lookaheadSteps, totalDays) {
  let maxP = -Infinity;
  for (let k = 1; k <= lookaheadSteps; k++) {
    let dd = d,
      ss = stepInDay + k;
    if (ss >= STEPS_PER_DAY) {
      dd += 1;
      ss -= STEPS_PER_DAY;
    }
    if (dd >= totalDays) break;
    const t = getTariffTier(tiers, dd, ss, startWeekday);
    if (t.price > maxP) maxP = t.price;
  }
  return maxP === -Infinity ? 0 : maxP;
}

// ---------------------------------------------------------------------------
// Hauptsimulation
// ---------------------------------------------------------------------------
function runSimulation(cfg) {
  const {
    type,
    scale,
    levers,
    tariff,
    tariffTiers,
    csvBase,
    startWeekday,
    forecastFactor
  } = cfg;
  const tiers = tariffTiers && tariffTiers.length > 0 ? tariffTiers : DEFAULT_TARIFF_TIERS;
  const bt = BUILDING_TYPES[type];
  const annualKwh = bt.kwhPerUnit * scale;
  const days = csvBase ? Math.floor(csvBase.length / STEPS_PER_DAY) : DAYS;
  const monthly = Array.from({
    length: 12
  }, () => ({
    base: 0,
    pv: 0,
    wp: 0,
    boiler: 0,
    elektro: 0,
    lad: 0,
    grid: 0,
    exportKwh: 0,
    costEnergy: 0,
    costNetz: 0,
    batteryDischarge: 0
  }));
  let peakGrid = 0,
    peakGridNoBatt = 0;
  let sumBase = 0,
    sumPV = 0,
    sumWP = 0,
    sumBoiler = 0,
    sumElektro = 0,
    sumLad = 0;
  let sumOnsite = 0,
    sumExport = 0,
    sumGrid = 0,
    energyCostAccum = 0;
  let sumBatteryCharge = 0,
    sumBatteryDischarge = 0,
    sumBatteryGridCharge = 0;
  const durationCurve = [];
  const heatSum = Array.from({
    length: 7
  }, () => new Array(STEPS_PER_DAY).fill(0));
  const heatCount = Array.from({
    length: 7
  }, () => new Array(STEPS_PER_DAY).fill(0));
  const heatMax = Array.from({
    length: 7
  }, () => new Array(STEPS_PER_DAY).fill(0));
  // Aufschlüsselung nach Tarifstufe (für die "Preissignal"-Auswertung)
  const tierStats = {};
  tiers.forEach(t => {
    tierStats[t.id] = {
      name: t.name,
      color: t.color,
      kwh: 0,
      cost: 0
    };
  });

  // Batteriespeicher: Ladezustand (SoC) bleibt über das ganze Jahr erhalten
  // (kein Reset pro Tag) — ein echter Speicher lädt/entlädt kontinuierlich.
  const battOn = !!levers.battery;
  const capacityKwh = battOn ? levers.batteryKwh * levers.batteryCount : 0;
  const powerKw = battOn ? levers.batteryKw * levers.batteryCount : 0;
  const rtEff = battOn ? Math.max(0.5, Math.min(1, levers.batteryEfficiency / 100)) : 1;
  const oneWayEff = Math.sqrt(rtEff); // Round-Trip-Wirkungsgrad symmetrisch auf Lade-/Entladepfad verteilt
  let soc = capacityKwh * 0.5; // Start bei 50% SoC

  // Vorausschauende Steuerung (Tarif-Lookahead + EW-Signal + Wetterprognose-Bias)
  const predictive = battOn && levers.batteryStrategy === "predictive";
  const ewSignal = levers.ewSignal || "gruen"; // "gruen" | "gelb" | "rot"
  // forecastFactor: 1 = normaler Prognose-Ertrag, <1 = unterdurchschnittlich (mehr
  // Reserve halten), >1 = überdurchschnittlich (mehr auf PV verlassen). Kommt aus
  // der geladenen Wetterprognose (Open-Meteo); ohne Prognose = 1 (neutral).
  const ff = typeof forecastFactor === "number" && isFinite(forecastFactor) ? forecastFactor : 1;
  const targetFraction = Math.max(0.5, Math.min(0.95, 0.9 - (ff - 1) * 0.3));
  const gridChargeAllowed = ewSignal !== "rot";
  const gridChargePowerFactor = ewSignal === "gelb" ? 0.5 : 1; // gelb = gedrosselt, rot = gesperrt
  const lookaheadSteps = 16; // 4 Stunden

  for (let d = 0; d < days; d++) {
    const base = csvBase ? csvBase.slice(d * STEPS_PER_DAY, (d + 1) * STEPS_PER_DAY) : baseDay(type, annualKwh, d, startWeekday);
    const pvKwp = levers.pv ? levers.pvKwp * levers.pvCount : 0;
    const pv = pvDay(pvKwp, d);
    const wp = levers.wp ? wpDay(levers.wpKwTh * levers.wpCount, levers.cop, d) : new Array(STEPS_PER_DAY).fill(0);
    const boiler = levers.boiler ? boilerDay(levers.boilerKw * levers.boilerCount, d) : new Array(STEPS_PER_DAY).fill(0);
    const elektro = levers.elektro ? elektroheizungDay(levers.elektroKw * levers.elektroCount, d) : new Array(STEPS_PER_DAY).fill(0);
    const ladShape = bt.tag === "residential" ? "LAD_evening" : "LAD_daytime";
    const lad = levers.lad ? ladDay(levers.ladKw, levers.ladCount, levers.ladSessionsPerWeek, ladShape, d, startWeekday) : new Array(STEPS_PER_DAY).fill(0);
    const month = Math.floor(d / days * 12);
    const wd = (d + startWeekday) % 7;

    // Erwartete PV-Deckung für HEUTE: nur vorausschauend aus dem Netz laden,
    // wenn PV den Tagesbedarf voraussichtlich NICHT von selbst deckt — sonst
    // würde das Vorladen späteren, kostenlosen PV-Überschuss verdrängen
    // (Exportverlust statt Ersparnis).
    let needsGridReserve = true;
    if (predictive) {
      const dayDemandTotal = base.reduce((a, b) => a + b, 0) + wp.reduce((a, b) => a + b, 0) + boiler.reduce((a, b) => a + b, 0) + elektro.reduce((a, b) => a + b, 0) + lad.reduce((a, b) => a + b, 0);
      const dayPvTotal = pv.reduce((a, b) => a + b, 0);
      const pvCoverageRatio = dayDemandTotal > 0 ? dayPvTotal / dayDemandTotal : 1;
      needsGridReserve = pvCoverageRatio < 0.85 * ff;
    }
    for (let s = 0; s < STEPS_PER_DAY; s++) {
      const demand = base[s] + wp[s] + boiler[s] + elektro[s] + lad[s];
      const onsitePv = Math.min(pv[s], demand);
      let surplus = pv[s] - onsitePv; // PV-Überschuss, der sonst exportiert würde
      let deficit = demand - onsitePv; // Restbedarf nach direktem PV-Verbrauch
      const gridKwNoBatt = deficit * 4;
      let batteryDischarge = 0,
        batteryCharge = 0,
        batteryGridCharge = 0;
      if (battOn && capacityKwh > 0) {
        // Überschuss zuerst in die Batterie laden (Eigenverbrauchsoptimierung)
        if (surplus > 0) {
          const maxChargePower = powerKw * 0.25; // kWh in diesem 15-Min-Intervall
          const headroom = (capacityKwh - soc) / oneWayEff;
          batteryCharge = Math.min(surplus, maxChargePower, Math.max(0, headroom));
          soc += batteryCharge * oneWayEff;
          surplus -= batteryCharge;
        }

        // VORAUSSCHAUEND: Falls in den nächsten Stunden ein teureres Tarif-
        // fenster beginnt und der Preisunterschied das lohnt, gezielt aus dem
        // günstigeren aktuellen Tarif vorladen — gedrosselt/gesperrt je nach EW-Signal.
        if (predictive && gridChargeAllowed && needsGridReserve) {
          const currentTier = getTariffTier(tiers, d, s, startWeekday);
          const futureMax = maxPriceWithin(tiers, d, s, startWeekday, lookaheadSteps, days);
          const targetSoc = capacityKwh * targetFraction;
          if (futureMax > currentTier.price * 1.15 && soc < targetSoc) {
            const remainingPower = Math.max(0, powerKw * 0.25 * gridChargePowerFactor - batteryCharge);
            const headroom = (targetSoc - soc) / oneWayEff;
            batteryGridCharge = Math.min(remainingPower, Math.max(0, headroom));
            soc += batteryGridCharge * oneWayEff;
          }
        }

        // Restbedarf aus der Batterie decken, falls noch Energie vorhanden
        if (deficit > 0 && soc > 0) {
          const maxDischargePower = powerKw * 0.25;
          const available = soc * oneWayEff;
          batteryDischarge = Math.min(deficit, maxDischargePower, available);
          soc -= batteryDischarge / oneWayEff;
          deficit -= batteryDischarge;
        }
      }
      deficit += batteryGridCharge; // gezielte Netzladung zählt als zusätzlicher (gewollter) Netzbezug

      const onsite = onsitePv + batteryDischarge;
      const exp = surplus;
      const grid = deficit;
      const gridKw = grid * 4;
      sumBase += base[s];
      sumPV += pv[s];
      sumWP += wp[s];
      sumBoiler += boiler[s];
      sumElektro += elektro[s];
      sumLad += lad[s];
      sumOnsite += onsite;
      sumExport += exp;
      sumGrid += grid;
      sumBatteryCharge += batteryCharge + batteryGridCharge;
      sumBatteryDischarge += batteryDischarge;
      sumBatteryGridCharge += batteryGridCharge;
      peakGrid = Math.max(peakGrid, gridKw);
      peakGridNoBatt = Math.max(peakGridNoBatt, gridKwNoBatt);
      durationCurve.push(gridKw);
      heatSum[wd][s] += gridKw;
      heatCount[wd][s] += 1;
      if (gridKw > heatMax[wd][s]) heatMax[wd][s] = gridKw;
      const tier = getTariffTier(tiers, d, s, startWeekday);
      const price = tier.price;
      const intervalCost = grid * price / 100;
      energyCostAccum += intervalCost;
      tierStats[tier.id].kwh += grid;
      tierStats[tier.id].cost += intervalCost;
      monthly[month].base += base[s];
      monthly[month].pv += pv[s];
      monthly[month].wp += wp[s];
      monthly[month].boiler += boiler[s];
      monthly[month].elektro += elektro[s];
      monthly[month].lad += lad[s];
      monthly[month].grid += grid;
      monthly[month].exportKwh += exp;
      monthly[month].batteryDischarge += batteryDischarge;
      monthly[month].costEnergy += intervalCost;
      monthly[month].costNetz += grid * tariff.netzentgelt / 100;
    }
  }
  const energyCost = energyCostAccum;
  const netzCost = sumGrid * tariff.netzentgelt / 100;
  const leistungsCost = tariff.leistungActive ? peakGrid * tariff.leistungspreis : 0;
  const einspeiseErtrag = sumExport * tariff.einspeise / 100;
  const totalCost = energyCost + netzCost + leistungsCost - einspeiseErtrag;
  durationCurve.sort((a, b) => b - a);
  const ddStep = Math.max(1, Math.floor(durationCurve.length / 300));
  const durationSampled = durationCurve.filter((_, i) => i % ddStep === 0).map((v, i) => ({
    x: i * ddStep,
    y: v
  }));
  const heatAvg = heatSum.map((row, wd) => row.map((v, s) => heatCount[wd][s] > 0 ? v / heatCount[wd][s] : 0));
  const annualKwhTotal = sumBase + sumWP + sumBoiler + sumElektro + sumLad;
  const batteryCycles = capacityKwh > 0 ? sumBatteryDischarge / capacityKwh : 0;
  return {
    annualKwh: annualKwhTotal,
    sumBase,
    sumPV,
    sumWP,
    sumBoiler,
    sumElektro,
    sumLad,
    sumOnsite,
    sumExport,
    sumGrid,
    peakGrid,
    peakGridNoBatt,
    energyCost,
    netzCost,
    leistungsCost,
    einspeiseErtrag,
    totalCost,
    selbstverbrauchsquote: sumPV > 0 ? sumOnsite / sumPV * 100 : 0,
    autarkiegrad: annualKwhTotal > 0 ? sumOnsite / annualKwhTotal * 100 : 0,
    sumBatteryCharge,
    sumBatteryDischarge,
    sumBatteryGridCharge,
    batteryCycles,
    capacityKwh,
    powerKw,
    tierStats,
    monthly,
    durationSampled,
    heatMax,
    heatAvg,
    days
  };
}

// Wandelt Open-Meteo-Stundenwerte (Globalstrahlung W/m²) in eine grobe
// Tagesprognose um: erwarteter PV-Ertrag [kWh je kWp] + Verhältnis zum
// saisonal üblichen Modellwert (= "Prognose-Faktor" für die Batteriesteuerung).
function weatherIcon(cloudCover) {
  if (cloudCover < 20) return "☀️";
  if (cloudCover < 50) return "🌤️";
  if (cloudCover < 80) return "⛅";
  return "☁️";

function processWeatherForecast(json, currentDayOfYear) {
  const times = json.hourly.time;
  const radiation = json.hourly.shortwave_radiation;
  const cloudCover = json.hourly.cloud_cover || [];
  const temperature = json.hourly.temperature_2m || [];
  const byDay = {};
  for (let i = 0; i < times.length; i++) {
    const dateKey = times[i].slice(0, 10);
    if (!byDay[dateKey]) byDay[dateKey] = {
      rad: [],
      cloud: [],
      temp: []
    };
    byDay[dateKey].rad.push(radiation[i] || 0);
    byDay[dateKey].cloud.push(cloudCover[i] != null ? cloudCover[i] : 50);
    byDay[dateKey].temp.push(temperature[i] != null ? temperature[i] : null);
  }
  const dateKeys = Object.keys(byDay).sort();
